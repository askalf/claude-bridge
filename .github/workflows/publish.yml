name: Publish to npm

# Fires when a GitHub Release is published for this repo. The release tag
# (e.g. v0.1.0) should match package.json's `version` — the workflow
# doesn't enforce that, but publishing a mismatched version will either
# succeed (if the package.json number isn't already on npm) and create a
# confusing tag/version relationship, or fail (if the package.json number
# is already published). Keep them in sync at release-prep time.
#
# `--provenance` requires id-token: write and publishes a signed SLSA
# attestation alongside the tarball, so consumers can verify the package
# was built from this exact commit via GitHub Actions.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: node dist/index.js --help
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
