name: actionlint

# Validates GitHub Actions workflow YAML against actionlint's rule set.
# Catches the class of bugs (wrong interpolation shape, missing `needs:`,
# shell-quoting, untrusted-input-in-run-script injection risks) that
# otherwise only surface at workflow-fire time.

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'
  push:
    branches: [master]
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install actionlint v1.7.1
        # Official release tarball, pinned to a specific version. Skipping
        # SHA256 verification here because actionlint is a CI-only lint
        # artifact that never ships to users.
        run: |
          set -euo pipefail
          curl -fsSL -o actionlint.tgz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.1/actionlint_1.7.1_linux_amd64.tar.gz
          tar xzf actionlint.tgz actionlint
          chmod +x actionlint
          ./actionlint -version

      - name: Run actionlint
        run: ./actionlint -color
